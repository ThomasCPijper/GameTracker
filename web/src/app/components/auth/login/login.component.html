<div class="container-fluid vh-100">
  <div class="row h-100">

    <!-- LEFT SIDE (branding) -->
    <div class="col bg-dark text-white d-flex flex-column justify-content-center align-items-center">
      <h1 class="mb-3">GameTracker</h1>
      <p class="text-secondary">Track your board games like a pro</p>
    </div>

    <!-- RIGHT SIDE (login) -->
    <div class="col bg-light d-flex justify-content-center align-items-center">

      <div class="w-75 p-4 bg-white rounded-4 shadow">

        <h2 class="mb-4">Welcome back</h2>

        <button class="btn btn-primary w-100 mb-2" (click)="login()">
          Log in
        </button>

        <button class="btn btn-outline-primary w-100" (click)="signup()">
          Sign up
        </button>

      </div>

    </div>

  </div>
</div>
